name: Sync Design Tokens

on:
  push:
    branches: [main]
    paths:
      - 'tokens.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run token sync
        run: node scripts/sync-tokens.js

      - name: Commit synced files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html resume-figma-plugin/code.js
          git diff --staged --quiet || git commit -m "chore: sync design tokens from tokens.json [skip ci]"
          git push
